<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PomoJI - Offline</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen,
          Ubuntu, Cantarell, sans-serif;
        background: linear-gradient(135deg, #ef4444 0%, #f97316 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #1f2937;
      }

      .container {
        text-align: center;
        background: white;
        border-radius: 12px;
        padding: 48px 24px;
        max-width: 400px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
      }

      .icon {
        font-size: 72px;
        margin-bottom: 24px;
        animation: pulse 2s ease-in-out infinite;
      }

      @keyframes pulse {
        0%, 100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }

      h1 {
        font-size: 28px;
        margin-bottom: 12px;
        color: #ef4444;
      }

      p {
        font-size: 16px;
        color: #6b7280;
        line-height: 1.6;
        margin-bottom: 24px;
      }

      .tips {
        background: #f3f4f6;
        border-left: 4px solid #ef4444;
        padding: 16px;
        text-align: left;
        border-radius: 4px;
        margin-bottom: 24px;
      }

      .tips h3 {
        color: #1f2937;
        font-size: 14px;
        margin-bottom: 8px;
      }

      .tips ul {
        list-style: none;
        font-size: 14px;
        color: #6b7280;
      }

      .tips li {
        margin-bottom: 6px;
      }

      .tips li:before {
        content: '✓ ';
        color: #ef4444;
        font-weight: bold;
        margin-right: 6px;
      }

      .button-group {
        display: flex;
        gap: 12px;
      }

      button {
        flex: 1;
        padding: 12px 24px;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
        font-weight: 600;
        transition: all 0.3s ease;
      }

      .btn-primary {
        background: #ef4444;
        color: white;
      }

      .btn-primary:hover {
        background: #dc2626;
      }

      .btn-secondary {
        background: #e5e7eb;
        color: #1f2937;
      }

      .btn-secondary:hover {
        background: #d1d5db;
      }

      .status {
        margin-top: 16px;
        font-size: 13px;
        color: #9ca3af;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">📡</div>
      <h1>You're Offline</h1>
      <p>
        It looks like you've lost your internet connection. But don't worry—your PomoJI
        data is safely cached!
      </p>

      <div class="tips">
        <h3>What you can do:</h3>
        <ul>
          <li>View your cached tasks</li>
          <li>Run the timer (offline)</li>
          <li>Continue working</li>
        </ul>
      </div>

      <div class="button-group">
        <button class="btn-secondary" onclick="window.history.back()">Go Back</button>
        <button class="btn-primary" onclick="window.location.href='/'">Go Home</button>
      </div>

      <div class="status">
        <p>Waiting for connection...</p>
        <p id="retry-status"></p>
      </div>
    </div>

    <script>
      // Check connection periodically
      let retryCount = 0;

      function checkConnection() {
        fetch('/manifest.json', { method: 'HEAD', cache: 'no-store' })
          .then(() => {
            // Connected! Redirect to home
            window.location.href = '/';
          })
          .catch(() => {
            retryCount++;
            const status = document.getElementById('retry-status');
            status.textContent = `Checking connection... (attempt ${retryCount})`;
          });
      }

      // Check every 3 seconds
      setInterval(checkConnection, 3000);

      // Also check on online event
      window.addEventListener('online', () => {
        window.location.href = '/';
      });
    </script>
  </body>
</html>
